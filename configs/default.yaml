paths:
  data_train: data/exact2026/train.json
  data_dev: data/exact2026/dev.json
  data_test: data/exact2026/test.json
  artifacts: artifacts/
  translator_lora: artifacts/translator-lora/

models:
  # Qwen/Qwen3.5-4B-Base (https://huggingface.co/Qwen/Qwen3.5-4B-Base) — the
  # ONE model used everywhere in this pipeline (translator + CoT fallback).
  # It ships bf16 weights, so vLLM loads it UNQUANTIZED (quantization: none).
  # A 4B in bf16 is ~8 GB; on the RTX 5070's 12 GB that's TIGHT once you add the
  # K=5 KV cache. If vLLM OOMs, switch to fp8 (Blackwell-native, ~4 GB) below, or
  # run 4-bit on the transformers backend (`run_pipeline.py --backend hf --precision 4bit`).
  workhorse: Qwen/Qwen3.5-4B-Base
  quantization: none                  # none=bf16 | fp8 (recommended on 12 GB) | bitsandbytes. NOT awq.
  dtype: bfloat16                     # Blackwell-native
  max_model_len: 4096                 # premises are short; lower to 3072 if KV cache is tight on 12 GB

vllm:
  gpu_memory_utilization: 0.80        # leave ~2.4 GB free for Z3 + Python on 12 GB
  enforce_eager: false
  enable_lora: true
  max_lora_rank: 32

translator:
  k_samples: 5
  temperature: 0.3
  top_p: 0.9
  max_new_tokens: 1024
  output_format: smtlib       # smtlib | python_z3

solver:
  timeout_ms: 5000
  emit_unsat_core: true

vote:
  high_confidence_threshold: 4   # >= votes for confidence 0.95
  medium_confidence_threshold: 3 # >= votes for confidence 0.70

fallback:
  k_samples: 5
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 2048
  # CoT fallback reuses the single model with the LoRA disabled — no second model.

pipeline:
  wall_clock_budget_s: 55      # leave 5s margin under the 60s cap
  log_per_stage: true

eval:
  split: dev
  out_path: artifacts/eval_results.json
